<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Карта-изображение для лабораторных работ</title>
</head>
<body>
    <h1>Навигация по лабораторным работам с помощью карты-изображения</h1>
    <p>Это изображение является картой. Нажмите на разные закладки, чтобы перейти к соответствующим заданиям.</p>

    <!--
        ВАЖНО: В примере используется файл images/map.gif.
        Убедитесь, что этот файл (или другой файл с таким же названием)
        есть в вашей папке images. Если у вас другое изображение,
        замените путь в атрибуте src.
        Картинка должна быть размером 411x46 пикселей, как в примере.
    -->
    <p>
        <img src="../images/1.gif" 
             width="411" 
             height="46" 
             usemap="#labmap" 
             alt="Навигационное меню лабораторных работ">
    </p>

    <map name="labmap">
        <area shape="poly" 
              alt="Лабораторная 1.1" 
              coords="210,27,203,9,202,6,197,2,192,1,120,1,115,2,110,6,112,9,119,27,119,32,211,32,210,27" 
              href="lab1_1.html"
              title="Перейти к заданию 1.1">
        <area shape="poly" 
              alt="Лабораторная 1.2" 
              coords="302,27,295,9,293,6,289,2,283,1,212,1,206,2,202,6,203,9,210,27,211,32,284,32,303,32,302,27" 
              href="lab1_2.html"
              title="Перейти к заданию 1.2">
        <area shape="poly" 
              alt="Лабораторная 1.4" 
              coords="302,27,303,32,394,32,393,27,386,9,382,3,375,1,303,1,298,2,293,6,295,9,302,27" 
              href="lab1_4.html"
              title="Перейти к заданию 1.4">
    </map>

    <hr>
    <p><a href="../index.html">Вернуться на главную</a></p>
</body>
</html>
