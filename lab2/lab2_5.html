<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма регистрации</title>

    <style>
        
        /* Стили для отступов между полями формы */
        form div {
            margin-bottom: 10px; /* Отступ между полями */
        }

        /* Стили для меток и полей ввода */
        label {
            font-weight: bold;
        }

        /* Новые стили: подпись слева от поля */
        .inline-label {
            display: inline-block;
            width: 70px; /* Фиксированная ширина для выравнивания */
            text-align: right; /* Выравниваем текст вправо */
            margin-right: 15px; /* Отступ от поля ввода */
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        textarea {
            padding: 5px;
            border: 2px solid #0044ff;
            border-radius: 7px;
        }

        /* Стиль для рамки вокруг всей формы */
        form {
            width: 500px;
            border: 3px solid #0044ff; /* Синяя рамка */
            padding: 20px; /* Внутренний отступ, чтобы содержимое не прилипало к рамке */
            border-radius: 10px; /* Скругление углов рамки */
        }
    </style>
</head>

<body>
    
        <h1>Форма регистрации</h1>

        <hr size="5" color="blue">

        <form action="DATA.php" method="POST">
            <!-- Поля ввода данных -->
            <div class="form-group">
                <label for="name" class="inline-label">Имя:</label>
                <input type="text" id="name" name="name" required placeholder="Введите ваше имя">
            </div>

            <div class="form-group">
                <label for="email" class="inline-label">Email:</label>
                <input type="email" id="email" name="email" required placeholder="Введите email">
            </div>

            <div class="form-group">
                <label for="password" class="inline-label">Пароль:</label>
                <input type="password" id="password" name="password" required placeholder="Введите пароль">
            </div>

            <!-- Выбор пола -->
            <div>
                <label class="inline-label">Ваш пол:</label>
                <div style="display: inline-block; vertical-align: top;">
                    <label for="male">Мужской</label>
                    <input type="radio" id="male" name="gender" value="male" required>
                </div>
                <div style="display: inline-block; vertical-align: top;">
                    <label for="female">Женский</label>
                    <input type="radio" id="female" name="gender" value="female">
                </div>
            </div>

             <div>
                <label for="year">Год рождения:</label>
                    <select id="year" name="birth_year">
                        <option value="2000">2000</option>
                        <option value="2001">2001</option>
                        <option value="2002">2002</option>
                        <option value="2003">2003</option>
                        <option value="2004">2004</option>
                        <option value="2005">2005</option>
                        <option value="2006">2006</option>
                        <option value="2007">2007</option>
                        <option value="2008">2008</option>
                    </select> -й
             </div>

            <!-- Дополнительные опции -->
            <div class="form-group language-group">
                <!-- Блок с выбором языков теперь просто следует за меткой -->
                <div style="display: inline-block;">
                    <label> Я знаю:</label>
                    <br><br>
                    <label for="lang-ru">Русский</label><br> <!-- Тег <br> переносит на новую строку -->
                    <input type="checkbox" id="lang-ru" name="language" value="ru"><br>
                    
                    <label for="lang-en">Английский</label><br>
                    <input type="checkbox" id="lang-en" name="language" value="en"><br>
                    
                    <label for="lang-fr">Французский</label><br>
                    <input type="checkbox" id="lang-fr" name="language" value="fr"><br>
                </div>
            </div>

             <!-- Новое поле "О себе" -->
             <div class="form-group">
                 <label for="about" class="inline-label">О себе:</label>
                 <textarea id="about" name="about" required placeholder= "Кратко расскажите о себе" rows="2"></textarea> <!-- Многострочное поле для текста -->
             </div>

            <!-- Кнопка отправки -->
            <button type="submit">Отправить</button>
            <button type="reset">Очистить</button>
        </form>
    
</body>
</html>
